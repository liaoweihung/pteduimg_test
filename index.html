<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>藥局衛教助手</title>
    <style>
        /* 1. 基礎重置 (最重要：防止任何元素意外撐開) */
        * { box-sizing: border-box; }
        :root { --primary: #2c3e50; --fav: #ff4757; --bg: #f4f7f6; }
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: var(--bg); 
            font-family: -apple-system, sans-serif;
            overflow-x: hidden; 
            user-select: none;
        }
header { 
            background: var(--primary); 
            color: white; 
            padding: 12px 15px; 
            font-weight: bold; 
            font-size: 1.3rem; 
            display: flex;         /* 讓圖示和文字並排 */
            align-items: center;   /* 垂直置中 */
            justify-content: center; /* 水平置中 */
            gap: 12px;             /* 圖示和文字的間距 */
        }
        .header-icon {
            height: 38px;          /* 控制上方圖示的大小 */
            width: 38px;
            object-fit: contain;
        }
        
        /* 2. 首頁選單佈局 */
        .section-title { padding: 15px 20px 5px; font-size: 0.9rem; color: #7f8c8d; font-weight: bold; }
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* 兩欄並排 */
            gap: 15px; 
            padding: 15px 20px 30px; 
        }
        .menu-item { 
            background: white; border-radius: 12px; padding: 25px 10px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee;
        }
        .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .fav-item { background: #fff5f6; border-color: #ffdae0; }
        .fav-label { font-size: 0.8rem; color: #e74c3c; margin-top: 5px; font-weight: bold; }

        /* 3. 視窗展示區 (終極鎖定法) */
        #viewer { 
            display: none; /* 透過 JS 切換成 flex */
            flex-direction: column;
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; 
            height: 100vh; 
            height: 100dvh; /* 針對手機動態視窗高度最佳化 */
            background: #000; 
            z-index: 9999; 
        }

        /* 頂部控制列 */
        .viewer-header { 
            flex: 0 0 auto; /* 高度固定，不參與縮放 */
            padding: 15px 20px; 
            color: white; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.9); 
        }
        #viewer-fav-btn { font-size: 1.8rem; color: #555; cursor: pointer; padding-right: 20px; }
        #viewer-fav-btn.active { color: var(--fav); }

        /* 圖片容器 (負責置中與限制邊界) */
        .image-viewport { 
            flex: 1 1 auto; /* 自動填滿上下剩餘空間 */
            position: relative;
            display: flex; 
            align-items: center;    /* 垂直置中 */
            justify-content: center; /* 水平置中 */
            width: 100%; 
            height: 100%;
            overflow: hidden; 
        }

        /* 圖片本體 (乖乖縮小) */
        .main-img { 
            max-width: 100%; 
            max-height: 100%; 
            width: auto; 
            height: auto; 
            object-fit: contain; /* 保證圖片完整顯示不裁切 */
            margin: auto;        /* 多加一層置中保險 */
        }

        /* 底部進度點 */
        .footer-minimal { 
            flex: 0 0 auto; /* 高度固定，不參與縮放 */
            padding: 20px; 
            background: rgba(0,0,0,0.9); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 10px; 
        }
        .dot { width: 8px; height: 8px; background: #555; border-radius: 50%; }
        .dot.active { background: white; width: 20px; border-radius: 4px; transition: 0.3s; }
    </style>
</head>
<body>

<header>
    <img src="icon.png" alt="關公圖示" class="header-icon">
    <span>藥局衛教助手</span>
</header>
<div id="fav-section" style="display:none;">
    <div class="section-title">⭐ 常用圖卡</div>
    <div class="menu-grid" id="fav-grid"></div>
</div>

<div class="section-title">📚 完整衛教步驟</div>
<div class="menu-grid" id="all-grid"></div>

<div id="viewer">
    <div class="viewer-header">
        <span id="v-title" style="font-size:1.2rem; font-weight:bold;">標題</span>
        <div style="display: flex; align-items: center;">
            <div id="viewer-fav-btn" onclick="toggleCurrentFav()">❤</div>
            <div onclick="closeViewer()" style="font-size: 2rem; cursor: pointer; line-height: 1;">✕</div>
        </div>
    </div>
    <div class="image-viewport" id="touch-zone">
        <img id="main-img" class="main-img" src="" alt="教學圖">
    </div>
    <div class="footer-minimal" id="v-steps"></div>
</div>

<script>
    const educationData = {
        'eye': { 
            title: '眼藥膏', icon: '👁️', 
            steps: ['img/eye_1.png', 'img/eye_2.png', 'img/eye_3.png', 'img/eye_4.png', 'img/eye_5.png', 'img/eye_6.png'] 
        },
        'rectal': { 
            title: '肛門塞劑', icon: '🍑', 
            steps: ['img/rec_1.png', 'img/rec_2.png', 'img/rec_3.png', 'img/rec_4.png'] 
        },
        'ear': { 
            title: '耳滴劑', icon: '👂', 
            steps: ['img/ear_1.png', 'img/ear_2.png', 'img/ear_3.png', 'img/ear_4.png', 'img/ear_5.png', 'img/ear_6.png'] 
        }
    };

    let favoriteImages = JSON.parse(localStorage.getItem('favImages')) || [];
    let currentType = '', currentIdx = 0;

    function renderHome() {
        const allGrid = document.getElementById('all-grid');
        const favGrid = document.getElementById('fav-grid');
        allGrid.innerHTML = '';
        favGrid.innerHTML = '';

        Object.keys(educationData).forEach(key => {
            allGrid.innerHTML += `
                <div class="menu-item" onclick="openViewer('${key}', 0)">
                    <span class="icon">${educationData[key].icon}</span>
                    <div style="font-weight:bold; font-size:1.1rem;">${educationData[key].title}</div>
                </div>`;
        });

        favoriteImages.forEach(favKey => {
            const [type, idxStr] = favKey.split('-');
            const idx = parseInt(idxStr);
            if(educationData[type] && educationData[type].steps[idx]) {
                favGrid.innerHTML += `
                    <div class="menu-item fav-item" onclick="openViewer('${type}', ${idx})">
                        <span class="icon">${educationData[type].icon}</span>
                        <div style="font-weight:bold; font-size:1.1rem;">${educationData[type].title}</div>
                        <div class="fav-label">步驟 ${idx + 1}</div>
                    </div>`;
            }
        });
        document.getElementById('fav-section').style.display = favoriteImages.length > 0 ? 'block' : 'none';
    }

    function openViewer(type, startIndex = 0) {
        currentType = type; 
        currentIdx = startIndex;
        updateContent();
        document.getElementById('viewer').style.display = 'flex';
    }

    function closeViewer() { 
        document.getElementById('viewer').style.display = 'none'; 
        renderHome(); 
    }

    function updateContent() {
        const data = educationData[currentType];
        const totalSteps = data.steps.length;
        
        document.getElementById('v-title').innerText = `${data.title} (${currentIdx + 1}/${totalSteps})`;
        document.getElementById('main-img').src = data.steps[currentIdx];
        
        const dotContainer = document.getElementById('v-steps');
        dotContainer.innerHTML = data.steps.map((_, i) => 
            `<div class="dot ${i === currentIdx ? 'active' : ''}"></div>`
        ).join('');

        const currentKey = `${currentType}-${currentIdx}`;
        document.getElementById('viewer-fav-btn').className = favoriteImages.includes(currentKey) ? 'active' : '';
    }

    function toggleCurrentFav() {
        const currentKey = `${currentType}-${currentIdx}`;
        if (favoriteImages.includes(currentKey)) {
            favoriteImages = favoriteImages.filter(k => k !== currentKey);
        } else {
            favoriteImages.push(currentKey);
        }
        localStorage.setItem('favImages', JSON.stringify(favoriteImages));
        updateContent();
    }

    function changeStep(dir) {
        const totalSteps = educationData[currentType].steps.length;
        currentIdx = (currentIdx + dir + totalSteps) % totalSteps;
        updateContent();
    }

    const touchZone = document.getElementById('touch-zone');
    touchZone.addEventListener('click', (e) => {
        if (e.clientX > window.innerWidth / 2) changeStep(1);
        else changeStep(-1);
    });

    let touchStartX = 0;
    touchZone.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
    touchZone.addEventListener('touchend', e => {
        let diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) changeStep(diff > 0 ? 1 : -1);
    });

    document.addEventListener('keydown', (e) => {
        if (document.getElementById('viewer').style.display === 'flex') {
            if (e.key === 'ArrowRight') changeStep(1);
            if (e.key === 'ArrowLeft') changeStep(-1);
            if (e.key === 'Escape') closeViewer();
        }
    });

    window.onload = renderHome;
</script>
</body>
</html>
