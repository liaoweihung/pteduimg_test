<script>
      function trackImageUsage(imageName) {
          // 確保 GA4 有順利載入才執行
          if (typeof gtag === 'function') {
              gtag('event', 'view_instruction_card', {

    <script src="./qrious.min.js"></script>
    <style>
        /* 基礎重置 */
        * { box-sizing: border-box; }
        :root { --primary: #2c3e50; --fav: #ff4757; --bg: #f4f7f6; }
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100vh; 
            background: var(--bg); 
            font-family: -apple-system, sans-serif;
            overflow-x: hidden; 
            user-select: none;
        }
        header { 
            background: var(--primary); color: white; padding: 12px 15px; 
            font-weight: bold; font-size: 1.3rem; display: flex; 
            align-items: center; justify-content: center; gap: 12px; 
        }
        .header-icon { height: 38px; width: 38px; object-fit: contain; }
        .section-title { padding: 15px 20px 5px; font-size: 0.9rem; color: #7f8c8d; font-weight: bold; }
        .menu-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px 20px 30px; 
        }
        .menu-item { 
            background: white; border-radius: 12px; padding: 25px 10px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee;
        }
        .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .fav-item { background: #fff5f6; border-color: #ffdae0; }
        .fav-label { font-size: 0.8rem; color: #e74c3c; margin-top: 5px; font-weight: bold; }

        #viewer { 
            display: none; flex-direction: column; position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; 
            background: #000; z-index: 9999; 
        }
        .viewer-header { 
            flex: 0 0 auto; padding: 15px 20px; color: white; display: flex; 
            justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); 
        }
        #viewer-fav-btn { font-size: 1.8rem; color: #555; cursor: pointer; }
        #viewer-fav-btn.active { color: var(--fav); }

        .image-viewport { 
            flex: 1 1 auto; position: relative; display: flex; 
            align-items: center; justify-content: center; width: 100%; height: 100%; overflow: hidden; 
        }
        .main-img { 
            max-width: 100%; max-height: 100%; width: auto; height: auto; 
            object-fit: contain; margin: auto; 
        }
        .footer-minimal { 
            flex: 0 0 auto; padding: 20px; background: rgba(0,0,0,0.9); 
            display: flex; justify-content: center; align-items: center; gap: 10px; 
        }
        .dot { width: 8px; height: 8px; background: #555; border-radius: 50%; }
        .dot.active { background: white; width: 20px; border-radius: 4px; transition: 0.3s; }

        #qr-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .qr-box {
            background: white; padding: 30px; border-radius: 16px; text-align: center;
        }
        .qr-title { margin-top: 0; margin-bottom: 20px; color: #2c3e50; font-size: 1.2rem; }
        .qr-close {
            margin-top: 25px; padding: 12px 40px; background: #2c3e50; color: white;
            border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold;
        }

     /* 翻頁按鈕樣式 */
.nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 80px;
    background: rgba(255, 255, 255, 0.3);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    cursor: pointer;
    z-index: 10;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

.left-btn { left: 0; border-radius: 0 10px 10px 0; }
.right-btn { right: 0; border-radius: 10px 0 0 10px; }

/* 讓圖片支援原生縮放 */
.main-img {
    max-width: 100%;
    max-height: 100%;
    touch-action: pinch-zoom; /* 僅允許縮放，手勢翻頁由按鈕處理 */
}

        /* 5. 底部說明與提示文字區域 (非浮動) */
        .step-desc {
            flex: 0 0 auto;
            background: rgba(0,0,0,0.9); /* 與進度點相同的底色 */
            color: #e0e0e0;              /* 柔和的淺灰色字體，閱讀舒適 */
            padding: 0 20px 20px 20px;   /* 調整間距讓它緊貼進度點下方 */
            text-align: center;
            font-size: 1.05rem;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }
        
        /* 微調原本的進度點底部間距，讓它跟文字更緊密 */
        .footer-minimal { 
            flex: 0 0 auto; padding: 15px 20px 10px 20px; background: rgba(0,0,0,0.9); 
            display: flex; justify-content: center; align-items: center; gap: 10px; 
        }
        /* === 開發者專屬頁尾樣式 (極簡連結版) === */
        .creator-footer {
            text-align: center;
            padding: 25px 0 20px 0;
            width: 100%;
        }
        
        .creator-footer a {
            color: #888888; /* 平常是低調的灰色 */
            text-decoration: none; /* 拿掉醜醜的底線 */
            font-size: 13px;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        
        .creator-footer a:active {
            color: #66b3ff; /* 手指點按時會發出微光，給予點擊回饋 */
        }
        /* 首頁專屬頁尾：極簡淺色風格 */
.site-footer {
    text-align: center;
    padding: 30px 20px;
    color: #7f8c8d; /* 跟您的 Section Title 使用一樣的高級灰 */
    font-size: 0.85rem;
    line-height: 1.5;
}

/* 消除連結的藍色底線，維持灰色質感 */
.site-footer a {
    color: #7f8c8d;
    text-decoration: none;
}

/* 點擊時變成深藍色，給予回饋 */
.site-footer a:active {
    color: #2c3e50;
}
        /* --- 更新提示燈樣式 --- */
#update-light {
    display: none; /* 預設隱藏，有更新才出現 */
    position: fixed;
    bottom: 30px;     /* 放在底部，與底部的滑動區區隔 */
    right: 15px;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid #e0e0e0;
    padding: 6px 12px;
    border-radius: 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    cursor: pointer;
    z-index: 9999;
    align-items: center;
    gap: 8px;
    color: #555;
    font-size: 0.85rem;
    font-weight: bold;
    transition: transform 0.1s ease;
}

#update-light:active {
    transform: scale(0.95); /* 點擊時會有按下去的微縮小回饋 */
}

/* 會呼吸的小紅點 */
.pulse-dot {
    width: 10px;
    height: 10px;
    background-color: #ff4757; /* 醒目的警戒紅 */
    border-radius: 50%;
    display: inline-block;
    /* 製作呼吸擴散的動畫 */
    box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
    animation: pulse-animation 1.5s infinite;
}

@keyframes pulse-animation {
    0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
    70% { box-shadow: 0 0 0 8px rgba(255, 71, 87, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
}

<body>

<header>
    <img src="icon.png" alt="圖示" class="header-icon">
    <span>藥局衛教助手</span>
</header>

<div id="fav-section" style="display:none;">
    <div class="section-title">⭐ 常用圖卡</div>
    <div class="menu-grid" id="fav-grid"></div>
</div>

<!-- 👇 把原本的完整衛教步驟，拆成以下兩個區塊 👇 -->

<div class="section-title">💊 藥品使用衛教</div>
<div class="menu-grid" id="drug-grid"></div>

<div class="section-title">🩹 日常照護衛教圖卡</div>
<div class="menu-grid" id="life-grid"></div>

<!-- 👆 拆分結束 👆 -->

<div id="qr-modal">
    <div class="qr-box">
        <h3 class="qr-title">請患者掃描下載</h3>
        <canvas id="qr-canvas"></canvas> 
        <br>
        <button class="qr-close" onclick="closeQRModal()">完成</button>
    </div>
</div>

<div id="viewer">
    <div class="viewer-header">
        <span id="v-title" style="font-size:1.2rem; font-weight:bold;">標題</span>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div onclick="showQRCode()" style="font-size: 1.6rem; color: #fff; cursor: pointer;">🔲</div>
            <div id="viewer-fav-btn" onclick="toggleCurrentFav()">❤</div>
            <div onclick="closeViewer()" style="font-size: 2rem; cursor: pointer;">✕</div>
        </div>
    </div>

    <div class="image-viewport" id="touch-zone">
        <img id="main-img" class="main-img" src="" alt="教學圖">
        
        <div class="nav-btn left-btn" onclick="changeStep(-1)">❮</div>
        <div class="nav-btn right-btn" onclick="changeStep(1)">❯</div>
    </div>
    <div class="footer-minimal" id="v-steps"></div>
    <div id="v-desc" class="step-desc"></div>
</div>

<script>
    const educationData = {
        'eye': { category: 'drug', title: '眼藥膏', icon: '👁️', steps: ['img/eye_1.png', 'img/eye_2.png', 'img/eye_3.png', 'img/eye_4.png', 'img/eye_5.png', 'img/eye_6.png'] },
        'multi_lang': { category: 'drug', title: '多語服藥時間', icon: '🌍', steps: ['img/lan_1.png', 'img/lan_2.png'],  texts: ['外籍看護服藥時間對照表 (包含英、泰、印、越)(第一頁)','外籍看護服藥時間對照表 (第二頁)'] },
        'ear': { category: 'drug', title: '耳滴劑', icon: '👂', steps: ['img/ear_1.png', 'img/ear_2.png', 'img/ear_3.png', 'img/ear_4.png', 'img/ear_5.png', 'img/ear_6.png'] },
        'nasal': { category: 'drug', title: '鼻噴劑', icon: '👃', steps: ['img/nasal_1.png','img/nasal_2.png','img/nasal_3.png','img/nasal_4.png','img/nasal_5.png'] },
        'NTG': {  category: 'drug', title: 'NTG 舌下錠', icon: '💊',  steps: ['img/NTG_1.png', 'img/NTG_2.png', 'img/NTG_3.png'] },
        'MDI': {  category: 'drug', title: 'MDI 吸入器', icon: '🌬️', steps: ['img/MDI_1.png', 'img/MDI_2.png', 'img/MDI_3.png', 'img/MDI_4.png', 'img/MDI_5.png', 'img/MDI_6.png', 'img/MDI_7.png']  },
        'hem_oint': {  category: 'drug', title: '痔瘡軟膏(內)', icon: '🧻', steps: ['img/hem_oint_1.png', 'img/hem_oint_2.png', 'img/hem_oint_3.png', 'img/hem_oint_4.png', 'img/hem_oint_5.png', 'img/hem_oint_6.png']  },
        'rectal': { category: 'drug', title: '肛門塞劑', icon: '🍑', steps: ['img/rec_1.png', 'img/rec_2.png', 'img/rec_3.png', 'img/rec_4.png','img/rec_5.png','img/rec_6.png','img/rec_7.png','img/rec_8.png'] },
        'vaginal': {  category: 'drug', title: '陰道塞劑', icon: '🧴',  steps: ['img/vag_1.png', 'img/vag_2.png', 'img/vag_3.png', 'img/vag_4.png']  },
        'vag_oint': {  category: 'drug', title: '陰道軟膏', icon: '🌸', steps: ['img/vag_oint_1.png', 'img/vag_oint_2.png', 'img/vag_oint_3.png', 'img/vag_oint_4.png', 'img/vag_oint_5.png', 'img/vag_oint_6.png']  },     
        'fall_wound': {  category: 'life', title: '傷口與疤痕',  icon: '🤕', steps: ['img/slipped_fall_wound.png', 'img/wound_oint.png', 'img/oint_choose.png', 'img/prevent_scar.png', 'img/artficial_vs_paraffin.png' ] },
        'Wet_Wrap' : {  category: 'life', title: '濕敷療法',  icon: '💦' , steps: ['img/Wet_Wrap.png'] },
        'hair_wash' : {  category: 'life', title: '洗去頭皮油膏', icon: '💆', steps: ['img/Ps_hair_wash.png'] }
    };

    let favoriteImages = JSON.parse(localStorage.getItem('favImages')) || [];
    let currentType = '', currentIdx = 0;

    function renderHome() {
        // 1. 把原本的 allGrid 換成抓取我們新建立的兩個網格
        const drugGrid = document.getElementById('drug-grid');
        const lifeGrid = document.getElementById('life-grid');
        const favGrid = document.getElementById('fav-grid');
        
        // 2. 每次重新渲染前，先清空網格
        drugGrid.innerHTML = '';
        lifeGrid.innerHTML = '';
        favGrid.innerHTML = '';

        Object.keys(educationData).forEach(key => {
            const item = educationData[key];
            
            // 把按鈕的 HTML 結構先準備好
            const buttonHTML = `
                <div class="menu-item" onclick="openViewer('${key}', 0)">
                    <span class="icon">${item.icon}</span>
                    <div style="font-weight:bold; font-size:1.1rem;">${item.title}</div>
                </div>`;

            // 3. 分流邏輯：判斷剛才設定的 category 標籤
            if (item.category === 'life') {
                lifeGrid.innerHTML += buttonHTML; // 如果是 life，放進下方日常照護區
            } else {
                drugGrid.innerHTML += buttonHTML; // 其他沒有特別標記的，預設都放進上方藥品區
            }
            
            // (如果您原本的程式碼裡面，這裡還有寫把按鈕塞進 favGrid 的邏輯，請記得保留！)
        });

        favoriteImages.forEach(favKey => {
            const [type, idxStr] = favKey.split('-');
            const idx = parseInt(idxStr);
            if(educationData[type] && educationData[type].steps[idx]) {
                favGrid.innerHTML += `
                    <div class="menu-item fav-item" onclick="openViewer('${type}', ${idx})">
                        <span class="icon">${educationData[type].icon}</span>
                        <div style="font-weight:bold; font-size:1.1rem;">${educationData[type].title}</div>
                        <div class="fav-label">步驟 ${idx + 1}</div>
                    </div>`;
            }
        });
        document.getElementById('fav-section').style.display = favoriteImages.length > 0 ? 'block' : 'none';
    }

    function openViewer(type, startIndex = 0) {
        currentType = type; 
        currentIdx = startIndex;
        resetZoom(); // 👈 新增：打開新圖片時重置縮放
        updateContent();
        document.getElementById('viewer').style.display = 'flex';
        // 👇 新增：每次打開圖卡時，自動抓取圖卡標題並發送 GA4 追蹤 👇
        if (educationData[type]) {
            trackImageUsage(educationData[type].title);
    }
    }
    function closeViewer() { 
        document.getElementById('viewer').style.display = 'none'; 
        renderHome(); 
    }

function updateContent() {
        const data = educationData[currentType];
        document.getElementById('v-title').innerText = `${data.title} (${currentIdx + 1}/${data.steps.length})`;
        document.getElementById('main-img').src = data.steps[currentIdx];
        document.getElementById('v-steps').innerHTML = data.steps.map((_, i) => `<div class="dot ${i === currentIdx ? 'active' : ''}"></div>`).join('');
        const currentKey = `${currentType}-${currentIdx}`;
        document.getElementById('viewer-fav-btn').className = favoriteImages.includes(currentKey) ? 'active' : '';

        // 👇 新增：更新底部文字區塊的邏輯 👇
        const descElement = document.getElementById('v-desc');
        if (data.texts && data.texts[currentIdx]) {
            // 情況 A：如果有設定專屬的衛教台詞，就顯示台詞
            descElement.innerHTML = data.texts[currentIdx];
            descElement.style.color = '#fff'; // 台詞用亮白色強調
        } else {
            // 情況 B：如果沒設定，就顯示給新使用者的「預設操作提示」
            descElement.innerHTML = '💡 提示：點擊兩側按鈕翻頁，雙指可放大圖片查看細節';
            descElement.style.color = '#a4b0be'; // 提示用暗灰色，不喧賓奪主
        }
    }

    

    function toggleCurrentFav() {
        const currentKey = `${currentType}-${currentIdx}`;
        if (favoriteImages.includes(currentKey)) favoriteImages = favoriteImages.filter(k => k !== currentKey);
        else favoriteImages.push(currentKey);
        localStorage.setItem('favImages', JSON.stringify(favoriteImages));
        updateContent();
    }

   function changeStep(dir) {
        // 防止事件冒泡（避免點按鈕卻點到後面的東西）
        if (event) event.stopPropagation(); 
        
        const total = educationData[currentType].steps.length;
        currentIdx = (currentIdx + dir + total) % total;
        resetZoom(); // 👈 翻頁時將圖片重置回原始大小，才不會卡住
        updateContent();

        // 重要：切換圖片時，將視窗捲軸重置回中心，方便下一張縮放
        const viewport = document.getElementById('touch-zone');
        viewport.scrollLeft = 0;
        viewport.scrollTop = 0;

        // 👇=== 新增：GA4 翻頁追蹤防彈裝甲 ===👇
        // 確保有網路且 GA4 正常載入時，才執行追蹤，避免離線時當機
        if (typeof gtag === 'function') {
            gtag('event', 'view_instruction_step', {
                'card_category': currentType,                     // 紀錄代號 (例如: 'fall_wound')
                'card_title': educationData[currentType].title,   // 紀錄中文標題 (例如: '傷口照護')
                'step_number': currentIdx + 1                     // 紀錄看了第幾張 (加 1 是因為陣列從 0 開始，這樣報表看 1, 2, 3 比較直覺)
            });
            console.log(`📊 GA4 追蹤：看了 [${educationData[currentType].title}] 的第 ${currentIdx + 1} 張圖`);
        }
        // 👆=== 新增結束 ===👆
    }

    function showQRCode() {
        const path = educationData[currentType].steps[currentIdx];
        const fullUrl = window.location.origin + window.location.pathname.replace('index.html', '') + path;
        new QRious({ element: document.getElementById('qr-canvas'), value: fullUrl, size: 220 });
        document.getElementById('qr-modal').style.display = 'flex';

        // 👇 新增的 GA4 追蹤雷達：記錄產生 QR Code 的動作 👇
        if (typeof gtag === 'function') {
            gtag('event', 'show_qr_code', {
                'card_category': educationData[currentType].title, // 記錄是哪個主題 (例如: 眼藥膏)
                'step_number': currentIdx + 1                      // 記錄是第幾個步驟的圖
            });
            console.log('📍 已傳送 GA4 記錄：產生 QR Code', educationData[currentType].title, '步驟', currentIdx + 1);
        }
    }

    function closeQRModal() { document.getElementById('qr-modal').style.display = 'none'; }
// === 圖片專屬縮放與移動引擎 (完美相容 iOS/Android) ===
    let scale = 1;
    let pointX = 0, pointY = 0;
    let start = { x: 0, y: 0 };
    let initialDistance = 0, initialScale = 1;
    let isPanning = false;

    const imgElement = document.getElementById('main-img');
    const tZone = document.getElementById('touch-zone');

    // 計算兩指之間的距離
    function getDistance(touches) {
        return Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY);
    }

    tZone.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault(); // 防止整個網頁被縮放
            initialDistance = getDistance(e.touches);
            initialScale = scale;
        } else if (e.touches.length === 1 && scale > 1) {
            // 只有在圖片放大的狀態下，才允許單指拖曳移動
            isPanning = true;
            start = { x: e.touches[0].pageX - pointX, y: e.touches[0].pageY - pointY };
        }
    }, { passive: false });

    tZone.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const currentDistance = getDistance(e.touches);
            scale = initialScale * (currentDistance / initialDistance);
            // 限制縮放比例：最小 1 倍，最大 4 倍
            scale = Math.min(Math.max(1, scale), 4); 
            applyTransform();
        } else if (e.touches.length === 1 && isPanning && scale > 1) {
            e.preventDefault();
            pointX = e.touches[0].pageX - start.x;
            pointY = e.touches[0].pageY - start.y;
            applyTransform();
        }
    }, { passive: false });

    tZone.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) isPanning = false;
        if (scale <= 1) resetZoom(); // 縮小回原狀時，自動置中
    });

    function applyTransform() {
        imgElement.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
    }

    function resetZoom() {
        scale = 1;
        pointX = 0;
        pointY = 0;
        applyTransform();
    }
    window.onload = renderHome;

// 👇 請把這段喚醒大腦的程式碼貼在這裡 👇
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        // 發現更新！點亮右上角的呼吸燈
                        document.getElementById('update-light').style.display = 'flex';
                    }
                });
            });
        });
    });
}
