<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="./icon.png?v=1">
    <title>藥局衛教助手</title>
    <script src="./qrious.min.js"></script>
    <style>
        /* 基礎重置 */
        * { box-sizing: border-box; }
        :root { --primary: #2c3e50; --fav: #ff4757; --bg: #f4f7f6; }
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: var(--bg); 
            font-family: -apple-system, sans-serif;
            overflow-x: hidden; 
            user-select: none;
        }
        header { 
            background: var(--primary); color: white; padding: 12px 15px; 
            font-weight: bold; font-size: 1.3rem; display: flex; 
            align-items: center; justify-content: center; gap: 12px; 
        }
        .header-icon { height: 38px; width: 38px; object-fit: contain; }
        .section-title { padding: 15px 20px 5px; font-size: 0.9rem; color: #7f8c8d; font-weight: bold; }
        .menu-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px 20px 30px; 
        }
        .menu-item { 
            background: white; border-radius: 12px; padding: 25px 10px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee;
        }
        .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .fav-item { background: #fff5f6; border-color: #ffdae0; }
        .fav-label { font-size: 0.8rem; color: #e74c3c; margin-top: 5px; font-weight: bold; }

        #viewer { 
            display: none; flex-direction: column; position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; 
            background: #000; z-index: 9999; 
        }
        .viewer-header { 
            flex: 0 0 auto; padding: 15px 20px; color: white; display: flex; 
            justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); 
        }
        #viewer-fav-btn { font-size: 1.8rem; color: #555; cursor: pointer; }
        #viewer-fav-btn.active { color: var(--fav); }

        .image-viewport { 
            flex: 1 1 auto; position: relative; display: flex; 
            align-items: center; justify-content: center; width: 100%; height: 100%; overflow: hidden; 
        }
        .main-img { 
            max-width: 100%; max-height: 100%; width: auto; height: auto; 
            object-fit: contain; margin: auto; 
        }
        .footer-minimal { 
            flex: 0 0 auto; padding: 20px; background: rgba(0,0,0,0.9); 
            display: flex; justify-content: center; align-items: center; gap: 10px; 
        }
        .dot { width: 8px; height: 8px; background: #555; border-radius: 50%; }
        .dot.active { background: white; width: 20px; border-radius: 4px; transition: 0.3s; }

        #qr-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .qr-box {
            background: white; padding: 30px; border-radius: 16px; text-align: center;
        }
        .qr-title { margin-top: 0; margin-bottom: 20px; color: #2c3e50; font-size: 1.2rem; }
        .qr-close {
            margin-top: 25px; padding: 12px 40px; background: #2c3e50; color: white;
            border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold;
        }

     /* 翻頁按鈕樣式 */
.nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 80px;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    cursor: pointer;
    z-index: 10;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

.left-btn { left: 0; border-radius: 0 10px 10px 0; }
.right-btn { right: 0; border-radius: 10px 0 0 10px; }

/* 讓圖片支援原生縮放 */
.main-img {
    max-width: 100%;
    max-height: 100%;
    touch-action: pinch-zoom; /* 僅允許縮放，手勢翻頁由按鈕處理 */
}

        
    </style>
</head>
<body>

<header>
    <img src="icon.png" alt="圖示" class="header-icon">
    <span>藥局衛教助手</span>
</header>

<div id="fav-section" style="display:none;">
    <div class="section-title">⭐ 常用圖卡</div>
    <div class="menu-grid" id="fav-grid"></div>
</div>

<div class="section-title">📚 完整衛教步驟</div>
<div class="menu-grid" id="all-grid"></div>

<div id="qr-modal">
    <div class="qr-box">
        <h3 class="qr-title">請患者掃描下載</h3>
        <canvas id="qr-canvas"></canvas> 
        <br>
        <button class="qr-close" onclick="closeQRModal()">完成</button>
    </div>
</div>

<div id="viewer">
    <div class="viewer-header">
        <span id="v-title" style="font-size:1.2rem; font-weight:bold;">標題</span>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div onclick="showQRCode()" style="font-size: 1.6rem; color: #fff; cursor: pointer;">🔲</div>
            <div id="viewer-fav-btn" onclick="toggleCurrentFav()">❤</div>
            <div onclick="closeViewer()" style="font-size: 2rem; cursor: pointer;">✕</div>
        </div>
    </div>

    <div class="image-viewport" id="touch-zone">
        <img id="main-img" class="main-img" src="" alt="教學圖">
        
        <div class="nav-btn left-btn" onclick="changeStep(-1)">❮</div>
        <div class="nav-btn right-btn" onclick="changeStep(1)">❯</div>
    </div>

    <div class="footer-minimal" id="v-steps"></div>
</div>

<script>
    const educationData = {
        'eye': { title: '眼藥膏', icon: '👁️', steps: ['img/eye_1.png', 'img/eye_2.png', 'img/eye_3.png', 'img/eye_4.png', 'img/eye_5.png', 'img/eye_6.png'] },
        'rectal': { title: '肛門塞劑', icon: '🍑', steps: ['img/rec_1.png', 'img/rec_2.png', 'img/rec_3.png', 'img/rec_4.png'] },
        'ear': { title: '耳滴劑', icon: '👂', steps: ['img/ear_1.png', 'img/ear_2.png', 'img/ear_3.png', 'img/ear_4.png', 'img/ear_5.png', 'img/ear_6.png'] },
        'nasal': { title: '鼻噴劑', icon: '👃', steps: ['img/nasal_1.png','img/nasal_2.png','img/nasal_3.png','img/nasal_4.png','img/nasal_5.png'] },
        'NTG': {  title: 'NTG 舌下錠', icon: '💊',  steps: ['img/NTG_1.png', 'img/NTG_2.png', 'img/NTG_3.png'] },
        'vaginal': {  title: '陰道塞劑', icon: '🧴',  steps: ['img/vag_1.png', 'img/vag_2.png', 'img/vag_3.png', 'img/vag_4.png']  }
    };

    let favoriteImages = JSON.parse(localStorage.getItem('favImages')) || [];
    let currentType = '', currentIdx = 0;

    function renderHome() {
        const allGrid = document.getElementById('all-grid');
        const favGrid = document.getElementById('fav-grid');
        allGrid.innerHTML = '';
        favGrid.innerHTML = '';

        Object.keys(educationData).forEach(key => {
            allGrid.innerHTML += `
                <div class="menu-item" onclick="openViewer('${key}', 0)">
                    <span class="icon">${educationData[key].icon}</span>
                    <div style="font-weight:bold; font-size:1.1rem;">${educationData[key].title}</div>
                </div>`;
        });

        favoriteImages.forEach(favKey => {
            const [type, idxStr] = favKey.split('-');
            const idx = parseInt(idxStr);
            if(educationData[type] && educationData[type].steps[idx]) {
                favGrid.innerHTML += `
                    <div class="menu-item fav-item" onclick="openViewer('${type}', ${idx})">
                        <span class="icon">${educationData[type].icon}</span>
                        <div style="font-weight:bold; font-size:1.1rem;">${educationData[type].title}</div>
                        <div class="fav-label">步驟 ${idx + 1}</div>
                    </div>`;
            }
        });
        document.getElementById('fav-section').style.display = favoriteImages.length > 0 ? 'block' : 'none';
    }

    function openViewer(type, startIndex = 0) {
        currentType = type; 
        currentIdx = startIndex;
        updateContent();
        document.getElementById('viewer').style.display = 'flex';
    }

    function closeViewer() { 
        document.getElementById('viewer').style.display = 'none'; 
        renderHome(); 
    }

    function updateContent() {
        const data = educationData[currentType];
        document.getElementById('v-title').innerText = `${data.title} (${currentIdx + 1}/${data.steps.length})`;
        document.getElementById('main-img').src = data.steps[currentIdx];
        document.getElementById('v-steps').innerHTML = data.steps.map((_, i) => `<div class="dot ${i === currentIdx ? 'active' : ''}"></div>`).join('');
        const currentKey = `${currentType}-${currentIdx}`;
        document.getElementById('viewer-fav-btn').className = favoriteImages.includes(currentKey) ? 'active' : '';
    }

    function toggleCurrentFav() {
        const currentKey = `${currentType}-${currentIdx}`;
        if (favoriteImages.includes(currentKey)) favoriteImages = favoriteImages.filter(k => k !== currentKey);
        else favoriteImages.push(currentKey);
        localStorage.setItem('favImages', JSON.stringify(favoriteImages));
        updateContent();
    }

    function changeStep(dir) {
        const total = educationData[currentType].steps.length;
        currentIdx = (currentIdx + dir + total) % total;
        updateContent();
    }


    function showQRCode() {
        const path = educationData[currentType].steps[currentIdx];
        const fullUrl = window.location.origin + window.location.pathname.replace('index.html', '') + path;
        new QRious({ element: document.getElementById('qr-canvas'), value: fullUrl, size: 220 });
        document.getElementById('qr-modal').style.display = 'flex';
    }

    function closeQRModal() { document.getElementById('qr-modal').style.display = 'none'; }

    window.onload = renderHome;
</script>
</body>
</html>
