<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>意見回饋 | DiamondL 開發系列</title>
    <style>
        /* === 完美復刻 Hub 的深色質感 === */
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #1a1a2e; /* 您的深色背景 */
            color: #e0e0e0;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .feedback-container {
            background: #252542; /* 表單區塊的微凸起底色 */
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
        }

        .brand-title {
            text-align: center;
            color: #3498db; /* DiamondL 專屬藍色 */
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #bdc3c7;
            font-size: 0.95rem;
        }

        /* 深色輸入框設計 */
        textarea {
            width: 100%;
            height: 150px;
            background: #161625;
            border: 1px solid #3d3d63;
            color: #ffffff;
            border-radius: 8px;
            padding: 15px;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #3498db;
        }

        /* 充滿科技感的藍色發光按鈕 */
        .submit-btn {
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover { background: #2980b9; }
        .submit-btn:disabled { background: #555; color: #888; cursor: not-allowed; }

        .status-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="feedback-container">
    <h2 class="brand-title">💎 意見回饋</h2>
    
    <form id="diamondl-form">
        <div class="input-group">
            <label for="feedback-content">請留下您的建議或想法：</label>
            <textarea id="feedback-content" placeholder="請在此輸入..." required></textarea>
        </div>
        <button type="submit" id="submit-btn" class="submit-btn">送出</button>
        <div id="status-msg" class="status-msg"></div>
    </form>
</div>

<script>
    // 🔗 請將下方引號內的網址，替換成您剛剛部署 GAS 獲得的 Web App URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw0uIMQZIeqmx-D0i4YBN7FPidC1QEteoNp6Ae28fMPKFC9HmH10jx6pvIB2DCom5R_/exec";

    // 取得網址列的參數（這樣我們就能知道他是從「衛教助手」還是「自學網」點擊過來的）
    const urlParams = new URLSearchParams(window.location.search);
    const sourceApp = urlParams.get('source') || '💎DiamondL 藥師工具總覽';

    document.getElementById('diamondl-form').addEventListener('submit', function(e) {
        e.preventDefault(); // 阻止表單預設的跳轉行為
        
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('status-msg');
        const content = document.getElementById('feedback-content').value;

        // 狀態改變：傳送中
        btn.innerText = "傳送中...";
        btn.disabled = true;
        msg.style.display = 'none';

        // 準備要傳送的資料
        const formData = new URLSearchParams();
        formData.append('source', sourceApp);
        formData.append('feedback', content);

        // 透過 Fetch API 靜默傳送給後端 GAS
        fetch(GAS_URL, {
            method: 'POST',
            body: formData
        })
        .then(response => {
            // 傳送成功：顯示綠色提示，清空輸入框
            btn.innerText = "傳送成功！";
            msg.innerText = "✅ 感謝您的回饋，資料已送出！";
            msg.style.color = "#2ecc71";
            msg.style.display = "block";
            document.getElementById('feedback-content').value = "";
            
            // 3秒後恢復按鈕原狀
            setTimeout(() => {
                btn.innerText = "傳送回饋";
                btn.disabled = false;
            }, 3000);
        })
        .catch(error => {
            // 傳送失敗：顯示紅色警告
            btn.innerText = "傳送回饋";
            btn.disabled = false;
            msg.innerText = "❌ 傳送失敗，請稍後再試。";
            msg.style.color = "#e74c3c";
            msg.style.display = "block";
            console.error("Error:", error);
        });
    });
</script>

</body>
</html>
