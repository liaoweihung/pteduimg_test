<div class="page-note" id="page-note"></div>

<div id="fav-section" style="display:none;">
    <div class="section-title">⭐ 常用圖卡</div>
    <div class="menu-grid" id="fav-grid"></div>
</div>

<!-- 分類區塊會由 cards.json 自動產生，不用再手動修改 index.html -->
<div id="category-sections"></div>

<div id="qr-modal">
    <div class="qr-box">
        <h3 class="qr-title">請患者掃描下載</h3>
        <canvas id="qr-canvas"></canvas> 
        <br>
        <button class="qr-close" onclick="closeQRModal()">完成</button>
    </div>
</div>

<div id="viewer">
    <div class="viewer-header">
        <span id="v-title" style="font-size:1.2rem; font-weight:bold;">標題</span>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div onclick="showQRCode()" style="font-size: 1.6rem; color: #fff; cursor: pointer;">🔲</div>
            <div id="viewer-fav-btn" onclick="toggleCurrentFav()">❤</div>
            <div onclick="closeViewer()" style="font-size: 2rem; cursor: pointer;">✕</div>
        </div>
    </div>

    <div class="image-viewport" id="touch-zone">
        <img id="main-img" class="main-img" src="" alt="教學圖">
        
        <div class="nav-btn left-btn" onclick="changeStep(-1)">❮</div>
        <div class="nav-btn right-btn" onclick="changeStep(1)">❯</div>
    </div>
    <div class="footer-minimal" id="v-steps"></div>
    <div id="v-desc" class="step-desc"></div>
</div>

<script>
    // 教育圖卡資料改由 build.py 產生 cards.json，新增圖片時不再手動改 index.html
    let educationData = {};

    const PAGE_TYPE = 'public';

    const pageMeta = {
        pharmacist: {
            title: '藥師藥品衛教助手',
            navId: 'nav-pharmacist'
        },
        public: {
            title: '民眾疾病衛教圖卡',
            navId: 'nav-public'
        }
    };

    const categoryMeta = {
        pharmacist_general: { title: '🧴 通用藥品使用說明', order: 10, page: 'pharmacist' },
        pharmacist_product: { title: '💊 特定產品衛教', order: 20, page: 'pharmacist' },
        public_education: { title: '🩹 民眾疾病衛教圖卡', order: 10, page: 'public' },
        uncategorized: { title: '📦 其他圖卡', order: 99, page: 'pharmacist' }
    };

    function isVisibleOnPage(item) {
        const cat = item.category || 'uncategorized';
        return (categoryMeta[cat]?.page || 'pharmacist') === PAGE_TYPE;
    }

   function setupPageHeader() {
    const meta = pageMeta[PAGE_TYPE];

    document.body.classList.add(`${PAGE_TYPE}-page`);

    document.querySelector('header span').innerText = meta.title;

    const noteElement = document.getElementById('page-note');
    if (meta.note) {
        noteElement.innerText = meta.note;
        noteElement.style.display = '';
    } else {
        noteElement.style.display = 'none';
    }

    document.getElementById(meta.navId)?.classList.add('active');
}

    async function loadEducationData() {
        try {
            const response = await fetch('./cards.json?v=' + Date.now(), { cache: 'no-store' });
            if (!response.ok) throw new Error('cards.json not found');
            educationData = await response.json();
        } catch (err) {
            console.error('無法讀取 cards.json：', err);
            document.getElementById('category-sections').innerHTML = `
                <div style="padding:20px; color:#c0392b; line-height:1.6;">
                    找不到圖卡資料 cards.json。請先執行 <b>python build.py</b>，或確認 GitHub Actions 已完成自動建置。
                </div>`;
            educationData = {};
        }
    }

    let favoriteImages = JSON.parse(localStorage.getItem('favImages')) || [];
    let currentType = '', currentIdx = 0;

    function renderHome() {
        const sectionRoot = document.getElementById('category-sections');
        const favGrid = document.getElementById('fav-grid');
        sectionRoot.innerHTML = '';
        favGrid.innerHTML = '';

        const categories = {};
        Object.keys(educationData).forEach(key => {
            const item = educationData[key];
            if (item.hidden) return;   // 👈 一定要有
            if (!isVisibleOnPage(item)) return;
            const cat = item.category || 'uncategorized';
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push({ key, item });
        });

        Object.keys(categories)
            .sort((a, b) => (categoryMeta[a]?.order || 99) - (categoryMeta[b]?.order || 99))
            .forEach(cat => {
                const title = categoryMeta[cat]?.title || cat;
                const gridId = `grid-${cat}`;
                sectionRoot.innerHTML += `<div class="section-title">${title}</div><div class="menu-grid" id="${gridId}"></div>`;
                const grid = document.getElementById(gridId);

                categories[cat]
                    .sort((a, b) => (a.item.order || 999) - (b.item.order || 999) || a.item.title.localeCompare(b.item.title, 'zh-Hant'))
                    .forEach(({ key, item }) => {
                        grid.innerHTML += `
                            <div class="menu-item" onclick="openViewer('${key}', 0)">
                                <span class="icon">${item.icon || '📌'}</span>
                                <div style="font-weight:bold; font-size:1.1rem;">${item.title}</div>
                            </div>`;
                    });
            });

        let visibleFavCount = 0;
        favoriteImages.forEach(favKey => {
            const [type, idxStr] = favKey.split('-');
            const idx = parseInt(idxStr);
            if(educationData[type] && educationData[type].steps[idx] && isVisibleOnPage(educationData[type])) {
                visibleFavCount++;
                favGrid.innerHTML += `
                    <div class="menu-item fav-item" onclick="openViewer('${type}', ${idx})">
                        <span class="icon">${educationData[type].icon}</span>
                        <div style="font-weight:bold; font-size:1.1rem;">${educationData[type].title}</div>
                        <div class="fav-label">步驟 ${idx + 1}</div>
                    </div>`;
            }
        });
        document.getElementById('fav-section').style.display = visibleFavCount > 0 ? 'block' : 'none';
    }

    function openViewer(type, startIndex = 0) {
        currentType = type; 
        currentIdx = startIndex;
        resetZoom(); // 👈 新增：打開新圖片時重置縮放
        updateContent();
        document.getElementById('viewer').style.display = 'flex';
        // 👇 新增：每次打開圖卡時，自動抓取圖卡標題並發送 GA4 追蹤 👇
        if (educationData[type]) {
            trackImageUsage(educationData[type].title);
    }
        // 👇 從這裡開始新增：修復 GA4 第一步起跑線盲區 👇
        if (typeof gtag === 'function') {
            gtag('event', 'view_instruction_step', {
                'card_title': educationData[type].title,
                'step_number': (currentIdx + 1) // 將程式的 0 轉換為人類理解的第 1 步
            });
        }
        // 👆 新增結束 👆
    }
    function closeViewer() { 
        document.getElementById('viewer').style.display = 'none'; 
        renderHome(); 
    }

function updateContent() {
        const data = educationData[currentType];
        document.getElementById('v-title').innerText = `${data.title} (${currentIdx + 1}/${data.steps.length})`;
        document.getElementById('main-img').src = data.steps[currentIdx];
        document.getElementById('v-steps').innerHTML = data.steps.map((_, i) => `<div class="dot ${i === currentIdx ? 'active' : ''}"></div>`).join('');
        const currentKey = `${currentType}-${currentIdx}`;
        document.getElementById('viewer-fav-btn').className = favoriteImages.includes(currentKey) ? 'active' : '';

        // 👇 新增：更新底部文字區塊的邏輯 👇
        const descElement = document.getElementById('v-desc');
        if (data.texts && data.texts[currentIdx]) {
            // 情況 A：如果有設定專屬的衛教台詞，就顯示台詞
            descElement.innerHTML = data.texts[currentIdx];
            descElement.style.color = '#fff'; // 台詞用亮白色強調
        } else {
            // 情況 B：如果沒設定，就顯示給新使用者的「預設操作提示」
            descElement.innerHTML = '💡 提示：點擊兩側按鈕翻頁，雙指可放大圖片查看細節';
            descElement.style.color = '#a4b0be'; // 提示用暗灰色，不喧賓奪主
        }
    }

    

    function toggleCurrentFav() {
        const currentKey = `${currentType}-${currentIdx}`;
        if (favoriteImages.includes(currentKey)) favoriteImages = favoriteImages.filter(k => k !== currentKey);
        else favoriteImages.push(currentKey);
        localStorage.setItem('favImages', JSON.stringify(favoriteImages));
        updateContent();
    }

   function changeStep(dir) {
        // 防止事件冒泡（避免點按鈕卻點到後面的東西）
        if (event) event.stopPropagation(); 
        
        const total = educationData[currentType].steps.length;
        currentIdx = (currentIdx + dir + total) % total;
        resetZoom(); // 👈 翻頁時將圖片重置回原始大小，才不會卡住
        updateContent();

        // 重要：切換圖片時，將視窗捲軸重置回中心，方便下一張縮放
        const viewport = document.getElementById('touch-zone');
        viewport.scrollLeft = 0;
        viewport.scrollTop = 0;

        // 👇=== 新增：GA4 翻頁追蹤防彈裝甲 ===👇
        // 確保有網路且 GA4 正常載入時，才執行追蹤，避免離線時當機
        if (typeof gtag === 'function') {
            gtag('event', 'view_instruction_step', {
                'card_category': currentType,                     // 紀錄代號 (例如: 'fall_wound')
                'card_title': educationData[currentType].title,   // 紀錄中文標題 (例如: '傷口照護')
                'step_number': currentIdx + 1                     // 紀錄看了第幾張 (加 1 是因為陣列從 0 開始，這樣報表看 1, 2, 3 比較直覺)
            });
            console.log(`📊 GA4 追蹤：看了 [${educationData[currentType].title}] 的第 ${currentIdx + 1} 張圖`);
        }
        // 👆=== 新增結束 ===👆
    }

    function showQRCode() {
        const path = educationData[currentType].steps[currentIdx];
        const fullUrl = window.location.origin + window.location.pathname.replace('index.html', '') + path;
        new QRious({ element: document.getElementById('qr-canvas'), value: fullUrl, size: 220 });
        document.getElementById('qr-modal').style.display = 'flex';

        // 👇 新增的 GA4 追蹤雷達：記錄產生 QR Code 的動作 👇
        if (typeof gtag === 'function') {
            gtag('event', 'show_qr_code', {
                'card_category': educationData[currentType].title, // 記錄是哪個主題 (例如: 眼藥膏)
                'step_number': currentIdx + 1                      // 記錄是第幾個步驟的圖
            });
            console.log('📍 已傳送 GA4 記錄：產生 QR Code', educationData[currentType].title, '步驟', currentIdx + 1);
        }
    }

    function closeQRModal() { document.getElementById('qr-modal').style.display = 'none'; }
// === 圖片專屬縮放與移動引擎 (完美相容 iOS/Android) ===
    let scale = 1;
    let pointX = 0, pointY = 0;
    let start = { x: 0, y: 0 };
    let initialDistance = 0, initialScale = 1;
    let isPanning = false;

    const imgElement = document.getElementById('main-img');
    const tZone = document.getElementById('touch-zone');

    // 計算兩指之間的距離
    function getDistance(touches) {
        return Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY);
    }

    tZone.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault(); // 防止整個網頁被縮放
            initialDistance = getDistance(e.touches);
            initialScale = scale;
        } else if (e.touches.length === 1 && scale > 1) {
            // 只有在圖片放大的狀態下，才允許單指拖曳移動
            isPanning = true;
            start = { x: e.touches[0].pageX - pointX, y: e.touches[0].pageY - pointY };
        }
    }, { passive: false });

    tZone.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const currentDistance = getDistance(e.touches);
            scale = initialScale * (currentDistance / initialDistance);
            // 限制縮放比例：最小 1 倍，最大 4 倍
            scale = Math.min(Math.max(1, scale), 4); 
            applyTransform();
        } else if (e.touches.length === 1 && isPanning && scale > 1) {
            e.preventDefault();
            pointX = e.touches[0].pageX - start.x;
            pointY = e.touches[0].pageY - start.y;
            applyTransform();
        }
    }, { passive: false });

    tZone.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) isPanning = false;
        if (scale <= 1) resetZoom(); // 縮小回原狀時，自動置中
    });

    function applyTransform() {
        imgElement.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
    }

    function resetZoom() {
        scale = 1;
        pointX = 0;
        pointY = 0;
        applyTransform();
    }
    window.onload = () => { setupPageHeader(); loadEducationData().then(renderHome); };

// 👇 請把這段喚醒大腦的程式碼貼在這裡 👇
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        // 發現更新！點亮右上角的呼吸燈
                        document.getElementById('update-light').style.display = 'flex';
                    }
                });
            });
        });
    });
}

</script>
